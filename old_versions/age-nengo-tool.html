<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合計算ツール (年齢・年号)</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px 0;
            background-color: #ffffff;
        }
        .container {
            background: #e0f7fa;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 360px;
            position: relative;
        }
        .accent {
            position: absolute;
            top: 15px;
            left: 20px;
            width: 30px;
            height: 30px;
            background-color: #fce4ec;
            border-radius: 50%;
            opacity: 0.8;
        }
        h1 { font-size: 1.4rem; text-align: center; color: #333; margin-bottom: 25px; }
        h2 { font-size: 0.9rem; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        
        .section { margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .row { display: flex; align-items: center; gap: 8px; }
        
        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        input[type="number"] { width: 100px; }
        input[type="date"] { width: 100%; box-sizing: border-box; font-family: inherit; }

        .result-text {
            font-size: 1.2rem;
            color: #007bff;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .note-text {
            font-size: 0.8rem;
            color: #d32f2f;
            margin-top: 4px;
            min-height: 1.2em;
        }

        hr { border: 0; border-top: 1px solid #b2ebf2; margin: 20px 0; }
        
        .label-small { font-size: 0.75rem; color: #777; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="accent"></div>
    <h1>総合計算ツール</h1>

    <div class="section">
        <h2>① 年齢計算</h2>
        <div class="input-group">
            <div class="label-small">生年月日</div>
            <input type="date" id="birthDate" onchange="calcAge()">
            
            <div class="label-small">計算基準日 (デフォルト: 今日)</div>
            <input type="date" id="baseDate" onchange="calcAge()">
        </div>
        <div id="ageResult" class="result-text">-- 歳</div>
    </div>

    <hr>

    <div class="section">
        <h2>② 和暦 → 西暦</h2>
        <div class="row">
            <select id="eraSelect" onchange="calcToSeireki()">
                <option value="reiwa">令和</option>
                <option value="heisei">平成</option>
                <option value="showa">昭和</option>
                <option value="taisho">大正</option>
            </select>
            <input type="number" id="warekiYear" placeholder="年" oninput="calcToSeireki()">
            <span>年</span>
        </div>
        <div id="seirekiResult" class="result-text">西暦 ---- 年</div>
        <div id="seirekiNote" class="note-text"></div>
    </div>

    <hr>

    <div class="section">
        <h2>③ 西暦 → 和暦</h2>
        <div class="row">
            <input type="number" id="seirekiInput" placeholder="2026" oninput="calcToWareki()">
            <span>年</span>
        </div>
        <div id="warekiResult" class="result-text">---- -- 年</div>
        <div id="warekiNote" class="note-text"></div>
    </div>
</div>

<script>
    // ページ読み込み時に基準日を今日に設定
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('baseDate').value = today;
    };

    // ③ 年齢計算のロジック
    function calcAge() {
        const birthVal = document.getElementById('birthDate').value;
        const baseVal = document.getElementById('baseDate').value;
        const resultArea = document.getElementById('ageResult');

        if (!birthVal || !baseVal) {
            resultArea.innerText = "-- 歳";
            return;
        }

        const birth = new Date(birthVal);
        const base = new Date(baseVal);

        let age = base.getFullYear() - birth.getFullYear();
        const m = base.getMonth() - birth.getMonth();

        // 誕生日がまだ来ていない場合は1歳引く
        if (m < 0 || (m === 0 && base.getDate() < birth.getDate())) {
            age--;
        }

        resultArea.innerText = age >= 0 ? `${age} 歳` : "未来の誕生日です";
    }

    // ① 和暦から西暦
    function calcToSeireki() {
        const era = document.getElementById('eraSelect').value;
        const year = parseInt(document.getElementById('warekiYear').value);
        const resultArea = document.getElementById('seirekiResult');
        const noteArea = document.getElementById('seirekiNote');

        if (!year) {
            resultArea.innerText = "西暦 ---- 年";
            noteArea.innerText = "";
            return;
        }

        let seireki = 0;
        let note = "";

        if (era === 'reiwa') {
            seireki = year + 2018;
            if (year === 1) note = "※5月1日から令和元年（4月30日までは平成31年）";
        } else if (era === 'heisei') {
            seireki = year + 1988;
            if (year === 1) note = "※1月8日から平成元年（1月7日までは昭和64年）";
            if (year === 31) note = "※4月30日まで平成31年（5月1日から令和元年）";
        } else if (era === 'showa') {
            seireki = year + 1925;
            if (year === 1) note = "※12月25日から昭和元年（12月24日までは大正15年）";
            if (year === 64) note = "※1月7日まで昭和64年（1月8日から平成元年）";
        } else if (era === 'taisho') {
            seireki = year + 1911;
            if (year === 15) note = "※12月24日まで大正15年（12月25日から昭和元年）";
        }

        resultArea.innerText = `西暦 ${seireki} 年`;
        noteArea.innerText = note;
    }

    // ② 西暦から和暦
    function calcToWareki() {
        const year = parseInt(document.getElementById('seirekiInput').value);
        const resultArea = document.getElementById('warekiResult');
        const noteArea = document.getElementById('warekiNote');

        if (!year) {
            resultArea.innerText = "---- -- 年";
            noteArea.innerText = "";
            return;
        }

        let result = "";
        let note = "";

        if (year > 2019) {
            result = `令和 ${year - 2018} 年`;
        } else if (year === 2019) {
            result = "平成31年 / 令和元年";
            note = "※4月30日まで平成、5月1日から令和";
        } else if (year > 1989) {
            result = `平成 ${year - 1988} 年`;
        } else if (year === 1989) {
            result = "昭和64年 / 平成元年";
            note = "※1月7日まで昭和、1月8日から平成";
        } else if (year > 1926) {
            result = `昭和 ${year - 1925} 年`;
        } else if (year === 1926) {
            result = "大正15年 / 昭和元年";
            note = "※12月24日まで大正、12月25日から昭和";
        } else if (year >= 1912) {
            result = `大正 ${year - 1911} 年`;
        } else {
            result = "大正以前です";
        }

        resultArea.innerText = result;
        noteArea.innerText = note;
    }
</script>

</body>
</html>
