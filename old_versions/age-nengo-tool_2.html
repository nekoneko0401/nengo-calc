<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合計算ツール v3</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .container {
            background: #e0f7fa;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            width: 360px;
            /* 縦幅がこれ以上小さくならないようにガード */
            min-height: 520px; 
            position: relative;
        }
        
        .cat-icon {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 1.2rem;
            color: #ff80ab;
            opacity: 0.8;
        }
        
        /* タイトルエリアとクリアボタン */
        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 15px;
        }
        h1 { font-size: 1.3rem; color: #333; margin: 5px 0; }
        
        .clear-btn {
            position: absolute;
            right: 0;
            background: #fff;
            border: 1px solid #b2ebf2;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #00acc1;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover { background: #b2ebf2; color: #fff; }
        
        h2 { 
            font-size: 0.95rem; 
            color: #444; 
            margin: 0 0 8px 0; 
            border-bottom: 2px solid #b2ebf2;
            padding-bottom: 3px;
        }
        h2::before { content: "【"; color: #00acc1; }
        h2::after { content: "】"; color: #00acc1; }
        
        .section { margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
        .row { display: flex; align-items: center; gap: 6px; }
        
        select, input {
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        input[type="number"] { width: 90px; }
        input[type="date"] { width: 100%; box-sizing: border-box; font-family: inherit; }

        .result-text {
            font-size: 1.25rem;
            color: #007bff;
            font-weight: bold;
            margin-top: 4px;
            display: inline-block;
            border-bottom: 2px solid #007bff;
            padding-bottom: 2px;
        }
        
        .note-text {
            font-size: 0.75rem;
            color: #d32f2f;
            margin-top: 2px;
            min-height: 1.2em;
        }

        hr { border: 0; border-top: 1px solid #b2ebf2; margin: 12px 0; }
        .label-small { font-size: 0.7rem; color: #777; margin-bottom: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="cat-icon">(ΦωΦ)</div>
    
    <div class="header-area">
        <h1>総合計算ツール</h1>
        <button class="clear-btn" onclick="resetAll()">クリア</button>
    </div>

    <div class="section">
        <h2>① 年齢計算</h2>
        <div class="input-group">
            <div class="label-small">生年月日</div>
            <input type="date" id="birthDate" onchange="calcAge()">
            <div class="label-small">計算基準日</div>
            <input type="date" id="baseDate" onchange="calcAge()">
        </div>
        <div><div id="ageResult" class="result-text">-- 歳</div></div>
    </div>

    <hr>

    <div class="section">
        <h2>② 和暦 → 西暦</h2>
        <div class="row">
            <select id="eraSelect" onchange="calcToSeireki()">
                <option value="reiwa">令和</option>
                <option value="heisei">平成</option>
                <option value="showa">昭和</option>
                <option value="taisho">大正</option>
            </select>
            <input type="number" id="warekiYear" placeholder="年" oninput="calcToSeireki()">
            <span>年</span>
        </div>
        <div><div id="seirekiResult" class="result-text">西暦 ---- 年</div></div>
        <div id="seirekiNote" class="note-text"></div>
    </div>

    <hr>

    <div class="section">
        <h2>③ 西暦 → 和暦</h2>
        <div class="row">
            <input type="number" id="seirekiInput" placeholder="2026" oninput="calcToWareki()">
            <span>年</span>
        </div>
        <div><div id="warekiResult" class="result-text">---- -- 年</div></div>
        <div id="warekiNote" class="note-text"></div>
    </div>
</div>

<script>
    // 今日の日付を取得する関数
    function getToday() {
        return new Date().toISOString().split('T')[0];
    }

    // 初期化設定
    window.onload = function() {
        document.getElementById('baseDate').value = getToday();
    };

    // 全リセット機能
    function resetAll() {
        // 入力値を空に
        document.getElementById('birthDate').value = "";
        document.getElementById('warekiYear').value = "";
        document.getElementById('seirekiInput').value = "";
        
        // 基準日は今日に戻す
        document.getElementById('baseDate').value = getToday();
        
        // 表示を初期状態に
        document.getElementById('ageResult').innerText = "-- 歳";
        document.getElementById('seirekiResult').innerText = "西暦 ---- 年";
        document.getElementById('seirekiNote').innerText = "";
        document.getElementById('warekiResult').innerText = "---- -- 年";
        document.getElementById('warekiNote').innerText = "";
    }

    // --- 計算ロジック (変更なし) ---
    function calcAge() {
        const birthVal = document.getElementById('birthDate').value;
        const baseVal = document.getElementById('baseDate').value;
        const resultArea = document.getElementById('ageResult');
        if (!birthVal || !baseVal) { resultArea.innerText = "-- 歳"; return; }
        const birth = new Date(birthVal); const base = new Date(baseVal);
        let age = base.getFullYear() - birth.getFullYear();
        const m = base.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && base.getDate() < birth.getDate())) { age--; }
        resultArea.innerText = age >= 0 ? `${age} 歳` : "未来の誕生日です";
    }

    function calcToSeireki() {
        const era = document.getElementById('eraSelect').value;
        const year = parseInt(document.getElementById('warekiYear').value);
        const resultArea = document.getElementById('seirekiResult');
        const noteArea = document.getElementById('seirekiNote');
        if (!year) { resultArea.innerText = "西暦 ---- 年"; noteArea.innerText = ""; return; }
        let seireki = 0; let note = "";
        if (era === 'reiwa') { seireki = year + 2018; if (year === 1) note = "※5月1日から令和元年"; }
        else if (era === 'heisei') { seireki = year + 1988; if (year === 1) note = "※1月8日から平成元年"; if (year === 31) note = "※4月30日まで平成31年"; }
        else if (era === 'showa') { seireki = year + 1925; if (year === 1) note = "※12月25日から昭和元年"; if (year === 64) note = "※1月7日まで昭和64年"; }
        else if (era === 'taisho') { seireki = year + 1911; if (year === 15) note = "※12月24日まで大正15年"; }
        resultArea.innerText = `西暦 ${seireki} 年`; noteArea.innerText = note;
    }

    function calcToWareki() {
        const year = parseInt(document.getElementById('seirekiInput').value);
        const resultArea = document.getElementById('warekiResult');
        const noteArea = document.getElementById('warekiNote');
        if (!year) { resultArea.innerText = "---- -- 年"; noteArea.innerText = ""; return; }
        let result = ""; let note = "";
        if (year > 2019) { result = `令和 ${year - 2018} 年`; }
        else if (year === 2019) { result = "平成31年 / 令和元年"; note = "※4月30日まで平成、5月1日から令和"; }
        else if (year > 1989) { result = `平成 ${year - 1988} 年`; }
        else if (year === 1989) { result = "昭和64年 / 平成元年"; note = "※1月7日まで昭和、1月8日から平成"; }
        else if (year > 1926) { result = `昭和 ${year - 1925} 年`; }
        else if (year === 1926) { result = "大正15年 / 昭和元年"; note = "※12月24日まで大正、12月25日から昭和"; }
        else if (year >= 1912) { result = `大正 ${year - 1911} 年`; }
        else { result = "大正以前です"; }
        resultArea.innerText = result; noteArea.innerText = note;
    }
</script>

</body>
</html>
